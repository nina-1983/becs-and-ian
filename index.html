<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Becs & Ian – 28 May 2027</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Caveat:wght@400;700&family=Comfortaa:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            font-family: 'Comfortaa', sans-serif;
            background: #2a2a2a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 999;
        }

        .card {
            background: #f5f5f5;
            padding: 60px 40px;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            position: relative;
            z-index: 10;
            border-radius: 20px;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 4rem;
            margin-bottom: 5px;
            color: #333;
            font-weight: 700;
            letter-spacing: -0.5px;
            animation: slideDown 0.8s ease-out;
        }

        .ampersand {
            color: #ff8c42;
            font-size: 2rem;
            display: inline-block;
            animation: spin 2s ease-in-out infinite;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes spin {
            0%, 100% {
                transform: scale(1) rotate(0deg);
            }
            50% {
                transform: scale(1.1) rotate(5deg);
            }
        }

        .subtitle {
            font-size: 1.2rem;
            color: #ff8c42;
            margin: 15px 0 40px;
            font-weight: 600;
            letter-spacing: 0.5px;
            animation: fadeInUp 1s ease-out 0.3s both;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .date-box {
            background: #f9f5f0;
            border: 3px solid #ff8c42;
            padding: 40px 20px;
            margin: 40px 0;
            cursor: pointer;
            transition: all 0.3s ease;
            border-radius: 15px;
            animation: bounceIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.5s both;
        }

        @keyframes bounceIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .date-box:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 40px rgba(255,140,66,0.3);
        }

        .date-label {
            font-size: 0.9rem;
            color: #999;
            margin-bottom: 10px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .date {
            font-size: 2.2rem;
            color: #333;
            margin-bottom: 5px;
        }

        .closing {
            font-size: 1rem;
            color: #666;
            margin-top: 40px;
            line-height: 1.6;
            animation: fadeInUp 1s ease-out 0.6s both;
        }

        .cta {
            font-size: 0.85rem;
            color: #ff8c42;
            margin-top: 30px;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: bold;
            animation: fadeInUp 1s ease-out 0.8s both;
        }

        .formal-notice {
            font-size: 0.75rem;
            color: #999;
            margin-top: 20px;
            letter-spacing: 1px;
            text-transform: uppercase;
            animation: fadeInUp 1s ease-out 0.9s both;
        }

        /* Floating hearts */
        .floating-heart {
            position: fixed;
            font-size: 2.5rem;
            opacity: 0.4;
            pointer-events: none;
            z-index: 1;
            color: #ff8c42;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) translateX(0) scale(1) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.6;
            }
            90% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(-120vh) translateX(var(--drift)) scale(1) rotate(360deg);
                opacity: 0;
            }
        }

        @media (max-width: 600px) {
            .card {
                padding: 40px 25px;
            }
            h1 {
                font-size: 2.5rem;
            }
            .date {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <canvas id="confetti"></canvas>

    <!-- Floating hearts -->
    <div class="floating-heart" id="heart1">♥</div>
    <div class="floating-heart" id="heart2">♥</div>
    <div class="floating-heart" id="heart3">♥</div>
    <div class="floating-heart" id="heart4">♥</div>
    <div class="floating-heart" id="heart5">♥</div>
    <div class="floating-heart" id="heart6">♥</div>

    <div class="card">
        <h1>Becs <span class="ampersand">&</span> Ian</h1>

        <p class="subtitle">We're getting married</p>

        <div class="date-box" id="dateBox">
            <div class="date-label">Friday</div>
            <div class="date">28 May 2027</div>
            <div class="date-label">Save the date</div>
        </div>

        <div class="closing">
            <p>We would love for you<br>to join us to celebrate<br>our marriage</p>
            <p class="cta">Click the date for a surprise!</p>
            <p class="formal-notice">Formal invitation to follow</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('confetti');
        const ctx = canvas.getContext('2d');
        const dateBox = document.getElementById('dateBox');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        function launchConfetti() {
            const colours = ['#ff8c42', '#2a2a2a', '#f5f5f5', '#ffb380', '#999999'];
            const rect = dateBox.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            
            // Canvas confetti rectangles only
            const pieces = Array.from({ length: 400 }, () => {
                const angle = Math.random() * Math.PI * 2;
                const velocity = 5 + Math.random() * 12;
                return {
                    x: centerX,
                    y: centerY,
                    w: Math.random() * 20 + 10,
                    h: Math.random() * 12 + 6,
                    colour: colours[Math.floor(Math.random() * colours.length)],
                    rot: Math.random() * Math.PI * 2,
                    vx: Math.cos(angle) * velocity,
                    vy: Math.sin(angle) * velocity - 5,
                    vr: (Math.random() - 0.5) * 0.4,
                };
            });

            let start = null;
            const duration = 5000;

            function draw(ts) {
                if (!start) start = ts;
                const elapsed = ts - start;
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                pieces.forEach(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.15;
                    p.rot += p.vr;
                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.rot);
                    ctx.fillStyle = p.colour;
                    ctx.globalAlpha = Math.max(0, 1 - elapsed / duration);
                    ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
                    ctx.restore();
                });

                if (elapsed < duration) {
                    requestAnimationFrame(draw);
                }
            }

            requestAnimationFrame(draw);

            // Start floating hearts immediately with confetti
            const hearts = document.querySelectorAll('.floating-heart');
            hearts.forEach((heart) => {
                const angle = Math.random() * Math.PI * 2;
                const velocity = 6 + Math.random() * 8;
                const randomDuration = 6 + Math.random() * 4;
                
                // Set starting position at date box center
                heart.style.left = centerX + 'px';
                heart.style.bottom = centerY + 'px';
                
                // Calculate drift based on angle and velocity
                const driftX = Math.cos(angle) * velocity * 60;
                const driftY = Math.sin(angle) * velocity * 60;
                
                heart.style.setProperty('--drift', driftX + 'px');
                heart.style.animation = `floatUp ${randomDuration}s ease-in forwards`;
                heart.style.opacity = '0.8';
            });
        }

        dateBox.addEventListener('click', launchConfetti);
        dateBox.addEventListener('touchstart', launchConfetti);
    </script>
</body>
</html>
