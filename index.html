<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Becs & Ian</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Caveat:wght@400;700&family=Comfortaa:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            font-family: 'Comfortaa', sans-serif;
            background: #2a2a2a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 999;
        }

        /* Floating hearts background */
        .floating-heart {
            position: fixed;
            font-size: 2.5rem;
            opacity: 0.4;
            pointer-events: none;
            z-index: 1;
            animation: floatUp 10s ease-in infinite;
            color: #ff8c42;
        }

        .floating-heart:nth-child(1) { left: 10%; animation-delay: 0s; animation-duration: 12s; }
        .floating-heart:nth-child(2) { left: 25%; animation-delay: 2s; animation-duration: 14s; }
        .floating-heart:nth-child(3) { left: 40%; animation-delay: 4s; animation-duration: 13s; }
        .floating-heart:nth-child(4) { left: 60%; animation-delay: 1s; animation-duration: 15s; }
        .floating-heart:nth-child(5) { left: 75%; animation-delay: 3s; animation-duration: 12s; }
        .floating-heart:nth-child(6) { left: 90%; animation-delay: 2.5s; animation-duration: 14s; }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 0.4;
            }
            90% {
                opacity: 0.4;
            }
            100% {
                transform: translateY(-100vh) scale(1);
                opacity: 0;
            }
        }

        /* Card entrance animation */
        .card {
            animation: cardFloat 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            background: #f5f5f5;
            padding: 60px 40px;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            position: relative;
            z-index: 10;
            border-radius: 20px;
        }

        @keyframes cardFloat {
            from {
                opacity: 0;
                transform: translateY(40px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 4rem;
            margin-bottom: 5px;
            color: #333;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .ampersand {
            color: #ff8c42;
            font-size: 2rem;
        }

        .subtitle {
            font-size: 1.2rem;
            color: #ff8c42;
            margin: 15px 0 40px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .date-box {
            background: #f9f5f0;
            border: 3px solid #ff8c42;
            padding: 40px 20px;
            margin: 40px 0;
            cursor: pointer;
            transition: all 0.3s ease;
            border-radius: 15px;
        }

        .date-box:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 40px rgba(255,140,66,0.3);
        }

        .date-label {
            font-size: 0.9rem;
            color: #999;
            margin-bottom: 10px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .date {
            font-size: 2.2rem;
            color: #333;
            margin-bottom: 5px;
        }

        .closing {
            font-size: 1rem;
            color: #666;
            margin-top: 40px;
            line-height: 1.6;
        }

        .cta {
            font-size: 0.85rem;
            color: #ff8c42;
            margin-top: 30px;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: bold;
        }

        @media (max-width: 600px) {
            .card {
                padding: 40px 25px;
            }
            h1 {
                font-size: 2.5rem;
            }
            .date {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <canvas id="confetti"></canvas>

    <!-- Floating hearts -->
    <div class="floating-heart">♥</div>
    <div class="floating-heart">♥</div>
    <div class="floating-heart">♥</div>
    <div class="floating-heart">♥</div>
    <div class="floating-heart">♥</div>
    <div class="floating-heart">♥</div>

    <div class="card">
        <h1>Becs <span class="ampersand">&</span> Ian</h1>
        <p class="subtitle">We're getting married</p>

        <div class="date-box" id="dateBox">
            <div class="date-label">Friday</div>
            <div class="date">28 May 2027</div>
            <div class="date-label">Save the date</div>
        </div>

        <div class="closing">
            <p>We would love for you<br>to join us to celebrate<br>our marriage</p>
            <p class="cta">Click the date for a surprise!</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('confetti');
        const ctx = canvas.getContext('2d');
        const dateBox = document.getElementById('dateBox');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        function launchConfetti() {
            const colours = ['#ff8c42', '#2a2a2a', '#f5f5f5', '#ffb380', '#999999'];
            const pieces = Array.from({ length: 150 }, () => ({
                x: Math.random() * canvas.width,
                y: Math.random() * -canvas.height,
                w: Math.random() * 12 + 8,
                h: Math.random() * 6 + 4,
                colour: colours[Math.floor(Math.random() * colours.length)],
                rot: Math.random() * Math.PI * 2,
                vx: (Math.random() - 0.5) * 4,
                vy: Math.random() * 5 + 3,
                vr: (Math.random() - 0.5) * 0.2,
            }));

            let start = null;
            const duration = 3500;

            function draw(ts) {
                if (!start) start = ts;
                const elapsed = ts - start;
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                pieces.forEach(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.rot += p.vr;
                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.rot);
                    ctx.fillStyle = p.colour;
                    ctx.globalAlpha = Math.max(0, 1 - elapsed / duration);
                    ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
                    ctx.restore();
                });

                if (elapsed < duration) {
                    requestAnimationFrame(draw);
                }
            }

            requestAnimationFrame(draw);
        }

        dateBox.addEventListener('click', launchConfetti);
        dateBox.addEventListener('touchstart', launchConfetti);
    </script>
</body>
</html>
